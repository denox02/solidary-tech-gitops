apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: app-targeting-service
  name: app-targeting-service
  namespace: targeting-service
spec:
  strategy:
    rollingUpdate:
      maxSurge: 50%
      maxUnavailable: 0
  replicas: 1
  selector:
    matchLabels:
      app: app-targeting-service
  template:
    metadata:
      labels:
        app: app-targeting-service
    spec:
      initContainers:
        - name: wait-for-auth-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for auth-service to be healthy..."
              until wget -qO- http://app-auth-service.auth-service.svc.cluster.local:8001/health > /dev/null 2>&1; do
                echo "auth-service not ready, retrying in 5s..."
                sleep 5
              done
              echo "auth-service is ready. Starting targeting-service."
      containers:
        - name: app-targeting-service
          image: 396368123600.dkr.ecr.us-east-1.amazonaws.com/togglemaster_targeting-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8003
          resources:
            requests:
              cpu: "250m"
              memory: "206Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /health
              port: 8003
            failureThreshold: 180
            periodSeconds: 1
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318"
            - name: OTEL_SERVICE_NAME
              value: "targeting-service"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=togglemaster"
          envFrom:
            - secretRef:
                name: targeting-db-secret
            - secretRef:
                name: targeting-db-secret-host 
