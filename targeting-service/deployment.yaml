apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: app-targeting-service
  name: app-targeting-service
  namespace: targeting-service
spec:
  strategy:
    rollingUpdate:
      maxSurge: 50%
      maxUnavailable: 0
  replicas: 1
  selector:
    matchLabels:
      app: app-targeting-service
  template:
    metadata:
      labels:
        app: app-targeting-service
    spec:
      containers:
      - name: app-targeting-service
        image: 396368123600.dkr.ecr.us-east-1.amazonaws.com/togglemaster_targeting-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8003