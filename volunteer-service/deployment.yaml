apiVersion: apps/v1
kind: Deployment
metadata:
  name: volunteer-service
  namespace: solidary-tech
  labels:
    project: solidary-tech
    environment: production
    costcenter: ngo-core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: volunteer-service
template:
  metadata:
    labels:
      app: volunteer-service
      project: solidary-tech
      environment: production
      costcenter: ngo-core
  spec:
    containers:
    - name: volunteer-service
      image: 385809084763.dkr.ecr.us-east-1.amazonaws.com/solidary-tech/volunteer-service:latest
      ports:
      - containerPort: 8080
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 15
        periodSeconds: 20
      readinessProbe:
        httpGet:
          path: /ready
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10
